name: 07 - Context
on:
    push: 
    workflow_dispatch:
        inputs:   
            debug:
                description: '07 - Context | Debug'
                type: boolean
                default:  false
jobs:
    echo-data:
        runs-on: ubuntu-latest
        steps:
            - name: Show GitHub Context
              run: |
                echo "Event: ${{ github.event_name }}"
                echo "Ref: ${{ github.ref }}"
                echo "SHA: ${{ github.sha }}"
                echo "Actor: ${{ github.actor }}"
                echo "WorkFlow: ${{ github.workflow }}"
        
            - name: Retrieve Variable
              run: |
                echo "Debug: ${{ vars.MY_VAR }}"


