name: 10 - Functions
on:
    pull_request:
    workflow_dispatch:
jobs:
    demo:
        runs-on: ubuntu-latest
        steps:
            - name: Failing step
              run: exit 1
            - name: Run on success
              if: success()
              run: echo "This runs only if the previous step succeeded."
            - name: Run on failure
              if: failure()
              run: echo "Failure step"
            - name: Run on always              
              if: always()
              run: echo "Always step."
            - name: Bug step
              if: ${{ contains(github.event.pull_request.title, 'fix') }}
              run: echo "Bug fix detected."